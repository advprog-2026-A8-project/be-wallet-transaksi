name: CI/CD Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Run Tests & Linter
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: walletdb
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out the Git repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Java toolchain
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Add gradlew permission
        run: chmod +x gradlew

      - name: Run Tests & Checkstyle
        run: ./gradlew clean test jacocoTestReport checkstyleMain checkstyleTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/walletdb
          SPRING_DATASOURCE_USERNAME: ${{ secrets.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: SonarCloud Scan (Push)
        if: github.event_name == 'push'
        run: ./gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan (PR)
        if: github.event_name == 'pull_request'
        run: |
          ./gradlew sonar \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }} \
            -Dsonar.pullrequest.provider=GitHub \
            -Dsonar.pullrequest.github.repository=${{ github.repository }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    name: Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Set environment variables
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "APP_PORT=8080" >> $GITHUB_ENV
            echo "CONTAINER_NAME=wallet_server_prod" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
            echo "DB_CONTAINER_NAME=postgres_db_prod" >> $GITHUB_ENV
            echo "DB_NAME=walletdb_prod" >> $GITHUB_ENV
            echo "DB_PORT=5432" >> $GITHUB_ENV
            echo "DB_VOLUME=postgres_data_prod" >> $GITHUB_ENV
          else
            echo "APP_PORT=8081" >> $GITHUB_ENV
            echo "CONTAINER_NAME=wallet_server_staging" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
            echo "DB_CONTAINER_NAME=postgres_db_staging" >> $GITHUB_ENV
            echo "DB_NAME=walletdb_staging" >> $GITHUB_ENV
            echo "DB_PORT=5433" >> $GITHUB_ENV
            echo "DB_VOLUME=postgres_data_staging" >> $GITHUB_ENV
          fi

      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}

      - name: Releasing New Version
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Cleanup old container names (one-time migration)
            docker stop wallet_server || true
            docker rm wallet_server || true
            
            # Stop and remove current env container
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}
            
            docker network create app_network || true
            
            # Cleanup old shared postgres_db container (one-time migration)
            docker stop postgres_db || true
            docker rm postgres_db || true
            
            # Create/start env-specific DB
            if [ "$(docker ps -aq -f name=^${{ env.DB_CONTAINER_NAME }}$)" ]; then
              # Container exists; ensure it is running
              if [ ! "$(docker ps -q -f name=^${{ env.DB_CONTAINER_NAME }}$)" ]; then
                docker start ${{ env.DB_CONTAINER_NAME }}
              fi
            else
              docker run -d \
                --name=${{ env.DB_CONTAINER_NAME }} \
                --network=app_network \
                -p ${{ env.DB_PORT }}:5432 \
                -v ${{ env.DB_VOLUME }}:/var/lib/postgresql/data \
                -e POSTGRES_DB=${{ env.DB_NAME }} \
                -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
                -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
                --restart always \
                postgres:15-alpine
            fi
            
            docker run -d \
              --name=${{ env.CONTAINER_NAME }} \
              --network=app_network \
              -p ${{ env.APP_PORT }}:8080 \
              -e POSTGRES_HOST=${{ env.DB_CONTAINER_NAME }} \
              -e POSTGRES_PORT=5432 \
              -e POSTGRES_DB=${{ env.DB_NAME }} \
              -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
              -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              --restart always \
              ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}
            
            docker ps
