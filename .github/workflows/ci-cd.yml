name: CI/CD Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Run Tests & Linter
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: walletdb_test
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 6001:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out the Git repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Java toolchain
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Add gradlew permission
        run: chmod +x gradlew

      - name: Run Tests & Checkstyle
        run: ./gradlew clean test jacocoTestReport checkstyleMain checkstyleTest
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: SonarCloud Scan (Push)
        if: github.event_name == 'push'
        run: ./gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    name: Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Set environment variables
        run: |
          echo "APP_PORT=6060" >> $GITHUB_ENV
          echo "APP_PORT_CANDIDATE=6100" >> $GITHUB_ENV
          echo "CONTAINER_NAME=wallet_server_prod" >> $GITHUB_ENV
          echo "CANDIDATE_CONTAINER_NAME=wallet_server_prod_candidate" >> $GITHUB_ENV
          echo "PREVIOUS_CONTAINER_NAME=wallet_server_prod_previous" >> $GITHUB_ENV
          echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          echo "VERSION_TAG=v$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "DB_CONTAINER_NAME=postgres_db_prod" >> $GITHUB_ENV
          echo "DB_NAME=walletdb_prod" >> $GITHUB_ENV
          echo "DB_PORT=6001" >> $GITHUB_ENV
          echo "DB_VOLUME=postgres_data_prod" >> $GITHUB_ENV
          echo "AUTH_SERVICE_BASE_URL=${{ secrets.AUTH_SERVICE_BASE_URL }}" >> $GITHUB_ENV
          echo "MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus" >> $GITHUB_ENV
          echo "MANAGEMENT_ENDPOINT_PROMETHEUS_ACCESS=unrestricted" >> $GITHUB_ENV
          echo "MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=true" >> $GITHUB_ENV
          echo "MONITORING_STACK_ENABLED=true" >> $GITHUB_ENV

      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build and push Docker image
        run: |
          set -euo pipefail
          IMAGE_BASE="${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}"
          echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
          docker build -t "${IMAGE_BASE}:${{ env.IMAGE_TAG }}" -t "${IMAGE_BASE}:${{ env.VERSION_TAG }}" .
          docker push "${IMAGE_BASE}:${{ env.IMAGE_TAG }}"
          docker push "${IMAGE_BASE}:${{ env.VERSION_TAG }}"

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload monitoring config to remote host
        if: env.MONITORING_STACK_ENABLED == 'true'
        run: |
          set -euo pipefail
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" "mkdir -p ~/wallet-monitoring"
          scp -r docker-compose.monitoring.yml monitoring "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/wallet-monitoring/"

      - name: Releasing New Version
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" <<'REMOTE_SCRIPT'
            set -euo pipefail

            HEALTHCHECK_PATH="/actuator/health"
            HEALTHCHECK_RETRIES=30
            HEALTHCHECK_SLEEP_SECONDS=2
            HAS_PREVIOUS=0

            wait_for_health() {
              local port=$1
              local path=$2
              local retries=$3
              local sleep_seconds=$4
              local url="http://localhost:${port}${path}"

              for i in $(seq 1 "$retries"); do
                if curl -fsS "$url" > /dev/null; then
                  echo "Health check passed: $url"
                  return 0
                fi
                echo "Waiting health check ($i/$retries): $url"
                sleep "$sleep_seconds"
              done

              echo "Health check failed: $url"
              return 1
            }

            wait_for_container_up() {
              local container_name=$1
              local retries=${2:-30}
              local sleep_seconds=${3:-2}

              for i in $(seq 1 "$retries"); do
                if [ "$(docker inspect -f '{{.State.Running}}' "$container_name" 2>/dev/null || echo false)" = "true" ]; then
                  echo "Container running: $container_name"
                  return 0
                fi
                echo "Waiting container ($i/$retries): $container_name"
                sleep "$sleep_seconds"
              done

              echo "Container failed to run: $container_name"
              return 1
            }

            if [ "${{ env.MONITORING_STACK_ENABLED }}" = "true" ]; then
              mkdir -p ~/wallet-monitoring
              cd ~/wallet-monitoring
              docker compose -f docker-compose.monitoring.yml up -d --remove-orphans
              wait_for_container_up prometheus 30 2
              wait_for_container_up grafana 30 2
              wait_for_container_up loki 30 2
              cd - >/dev/null
            fi

            # Cleanup old container names (one-time migration)
            docker stop wallet_server || true
            docker rm wallet_server || true
            
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}
            
            docker network create app_network || true
            
            # Cleanup old shared postgres_db container (one-time migration)
            docker stop postgres_db || true
            docker rm postgres_db || true
            
            # Create/start env-specific DB
            if [ "$(docker ps -aq -f name=^${{ env.DB_CONTAINER_NAME }}$)" ]; then
              # Container exists; ensure it is running
              if [ ! "$(docker ps -q -f name=^${{ env.DB_CONTAINER_NAME }}$)" ]; then
                docker start ${{ env.DB_CONTAINER_NAME }}
              fi
            else
              docker run -d \
                --name=${{ env.DB_CONTAINER_NAME }} \
                --network=app_network \
                -p ${{ env.DB_PORT }}:5432 \
                -v ${{ env.DB_VOLUME }}:/var/lib/postgresql/data \
                -e POSTGRES_DB=${{ env.DB_NAME }} \
                -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
                -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
                --restart always \
                postgres:15-alpine
            fi

            until docker exec ${{ env.DB_CONTAINER_NAME }} pg_isready -U "${{ secrets.POSTGRES_USER }}" -d "${{ env.DB_NAME }}"; do
              echo "Waiting for database readiness..."
              sleep 2
            done

            docker rm -f ${{ env.CANDIDATE_CONTAINER_NAME }} || true
            docker rm -f ${{ env.PREVIOUS_CONTAINER_NAME }} || true
            
            # 1) Deploy candidate first (inactive port)
            docker run -d \
              --name=${{ env.CANDIDATE_CONTAINER_NAME }} \
              --network=app_network \
              -p ${{ env.APP_PORT_CANDIDATE }}:8080 \
              -e POSTGRES_HOST=${{ env.DB_CONTAINER_NAME }} \
              -e POSTGRES_PORT=5432 \
              -e POSTGRES_DB=${{ env.DB_NAME }} \
              -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
              -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }} \
              -e MIDTRANS_SERVER_KEY=${{ secrets.MIDTRANS_SERVER_KEY }} \
              -e MIDTRANS_CLIENT_KEY=${{ secrets.MIDTRANS_CLIENT_KEY }} \
              -e MIDTRANS_MERCHANT_ID=${{ secrets.MIDTRANS_MERCHANT_ID }} \
              -e GRPC_SERVER_INTERNAL_TOKEN=${{ secrets.GRPC_SERVER_INTERNAL_TOKEN }} \
              -e AUTH_SERVICE_BASE_URL=${{ env.AUTH_SERVICE_BASE_URL }} \
              -e MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=${{ env.MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE }} \
              -e MANAGEMENT_ENDPOINT_PROMETHEUS_ACCESS=${{ env.MANAGEMENT_ENDPOINT_PROMETHEUS_ACCESS }} \
              -e MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=${{ env.MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED }} \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              --restart always \
              ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}

            if ! wait_for_health "${{ env.APP_PORT_CANDIDATE }}" "$HEALTHCHECK_PATH" "$HEALTHCHECK_RETRIES" "$HEALTHCHECK_SLEEP_SECONDS"; then
              docker logs --tail 200 ${{ env.CANDIDATE_CONTAINER_NAME }} || true
              docker rm -f ${{ env.CANDIDATE_CONTAINER_NAME }} || true
              exit 1
            fi

            # 2) Replace live container after candidate is healthy
            if [ "$(docker ps -aq -f name=^${{ env.CONTAINER_NAME }}$)" ]; then
              HAS_PREVIOUS=1
              docker stop ${{ env.CONTAINER_NAME }}
              docker rename ${{ env.CONTAINER_NAME }} ${{ env.PREVIOUS_CONTAINER_NAME }}
            fi

            docker run -d \
              --name=${{ env.CONTAINER_NAME }} \
              --network=app_network \
              -p ${{ env.APP_PORT }}:8080 \
              -e POSTGRES_HOST=${{ env.DB_CONTAINER_NAME }} \
              -e POSTGRES_PORT=5432 \
              -e POSTGRES_DB=${{ env.DB_NAME }} \
              -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
              -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }} \
              -e MIDTRANS_SERVER_KEY=${{ secrets.MIDTRANS_SERVER_KEY }} \
              -e MIDTRANS_CLIENT_KEY=${{ secrets.MIDTRANS_CLIENT_KEY }} \
              -e MIDTRANS_MERCHANT_ID=${{ secrets.MIDTRANS_MERCHANT_ID }} \
              -e GRPC_SERVER_INTERNAL_TOKEN=${{ secrets.GRPC_SERVER_INTERNAL_TOKEN }} \
              -e AUTH_SERVICE_BASE_URL=${{ env.AUTH_SERVICE_BASE_URL }} \
              -e MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=${{ env.MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE }} \
              -e MANAGEMENT_ENDPOINT_PROMETHEUS_ACCESS=${{ env.MANAGEMENT_ENDPOINT_PROMETHEUS_ACCESS }} \
              -e MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=${{ env.MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED }} \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              --restart always \
              ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}

            if ! wait_for_health "${{ env.APP_PORT }}" "$HEALTHCHECK_PATH" "$HEALTHCHECK_RETRIES" "$HEALTHCHECK_SLEEP_SECONDS"; then
              docker logs --tail 200 ${{ env.CONTAINER_NAME }} || true
              docker rm -f ${{ env.CONTAINER_NAME }} || true

              if [ "$HAS_PREVIOUS" -eq 1 ] && [ "$(docker ps -aq -f name=^${{ env.PREVIOUS_CONTAINER_NAME }}$)" ]; then
                docker rename ${{ env.PREVIOUS_CONTAINER_NAME }} ${{ env.CONTAINER_NAME }}
                docker start ${{ env.CONTAINER_NAME }}
                echo "Live deployment failed. Previous container restored."
              fi

              docker rm -f ${{ env.CANDIDATE_CONTAINER_NAME }} || true
              exit 1
            fi

            # 3) Cleanup old containers after successful cutover
            docker rm -f ${{ env.CANDIDATE_CONTAINER_NAME }} || true
            docker rm -f ${{ env.PREVIOUS_CONTAINER_NAME }} || true

            curl -fsS "http://localhost:9090/-/ready" > /dev/null || echo "WARNING: Prometheus not ready yet"
            curl -fsS "http://localhost:3000/api/health" > /dev/null || echo "WARNING: Grafana not ready yet"
            curl -fsS "http://localhost:3100/ready" > /dev/null || echo "WARNING: Loki not ready yet"
            
            docker ps
