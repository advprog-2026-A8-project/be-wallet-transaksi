name: SAST CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ "java-kotlin" ]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Init CodeQL
        uses: github/codeql-action/init@465128d237dfda0b541575b0f05b53b697abd1d6 # v3
        with:
          languages: ${{ matrix.language }}

      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build
        run: ./gradlew clean compileJava compileTestJava --no-daemon

      - name: Analyze
        uses: github/codeql-action/analyze@465128d237dfda0b541575b0f05b53b697abd1d6 # v3
