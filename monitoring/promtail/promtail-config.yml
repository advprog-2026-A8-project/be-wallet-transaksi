server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: /(wallet-app-main|wallet-app-dev)
        target_label: service
        replacement: wallet
      - source_labels: [__meta_docker_container_name]
        regex: /(wallet-app-main)
        target_label: env
        replacement: main
      - source_labels: [__meta_docker_container_name]
        regex: /(wallet-app-dev)
        target_label: env
        replacement: dev
      - source_labels: [container]
        regex: ".*"
        target_label: job
        replacement: docker
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            orderId: orderId
            transactionId: transactionId
            userId: userId
            requestId: requestId
            httpPath: httpPath
            httpMethod: httpMethod
      - labels:
          level:
          logger:
          orderId:
          transactionId:
          userId:
          requestId:
          httpPath:
          httpMethod:
