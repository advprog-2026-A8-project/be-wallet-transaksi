# Production configuration for AWS deployment
spring.application.name=be-wallet-transaksi

# Database - Uses environment variables from ECS task definition
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA settings for production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Actuator endpoints for AWS health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# Server configuration
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Logging for production
logging.level.root=INFO
logging.level.id.ac.ui.cs.advprog=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Security and external service integration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
midtrans.server-key=${MIDTRANS_SERVER_KEY}

auth.service.username-resolver.enabled=${AUTH_SERVICE_USERNAME_RESOLVER_ENABLED:true}
auth.service.base-url=${AUTH_SERVICE_BASE_URL}
auth.service.timeout-ms=${AUTH_SERVICE_TIMEOUT_MS:1000}

order.service.publisher.enabled=${ORDER_SERVICE_PUBLISHER_ENABLED:false}
order.service.base-url=${ORDER_SERVICE_BASE_URL:http://order-service:8080}
order.service.timeout-ms=${ORDER_SERVICE_TIMEOUT_MS:1000}
