spring.application.name=be-wallet-transaksi

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:walletdb}
spring.datasource.username=${POSTGRES_USER:wallet}
spring.datasource.password=${POSTGRES_PASSWORD:walletpass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:DefaultSecretKeyUntukDevelopmentLokalYangSangatPanjangSekali123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}
midtrans.server-key=${MIDTRANS_SERVER_KEY:}

auth.service.username-resolver.enabled=${AUTH_SERVICE_USERNAME_RESOLVER_ENABLED:true}
auth.service.base-url=${AUTH_SERVICE_BASE_URL:http://localhost:8080}
auth.service.timeout-ms=${AUTH_SERVICE_TIMEOUT_MS:1000}
