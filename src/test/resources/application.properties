spring.datasource.url=${TEST_DB_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${TEST_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${TEST_DB_USERNAME:sa}
spring.datasource.password=${TEST_DB_PASSWORD:}
spring.jpa.database-platform=${TEST_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${TEST_JPA_DDL_AUTO:create-drop}
spring.h2.console.enabled=${TEST_H2_CONSOLE_ENABLED:false}
midtrans.server-key=${TEST_MIDTRANS_SERVER_KEY:test-server-key}
midtrans.client-key=${TEST_MIDTRANS_CLIENT_KEY:test-client-key}
midtrans.merchant-id=${TEST_MIDTRANS_MERCHANT_ID:test-merchant-id}
midtrans.snap.api-base-url=${TEST_MIDTRANS_SNAP_API_BASE_URL:http://localhost:9999}
